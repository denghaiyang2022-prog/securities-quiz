<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#17324d" />
  <title>金融市场基础知识 · 练习册</title>
  <link rel="stylesheet" href="styles.css?v=2" />
</head>
<body>
  <div class="paper-noise" aria-hidden="true"></div>
  <header class="topbar">
    <a class="brand" href="#" aria-label="返回第一题">
      <span class="brand-mark">证</span>
      <span><strong>金融市场基础知识</strong><small>2019 回忆版 · 第三套</small></span>
    </a>
    <div class="header-actions">
      <button class="text-button" id="resetBtn" type="button">重新练习</button>
      <button class="icon-button mobile-only" id="sheetBtn" type="button" aria-label="打开答题卡">☷</button>
    </div>
  </header>

  <main class="app-shell">
    <section class="quiz-panel">
      <div class="progress-row">
        <div>
          <span class="eyebrow" id="category">单项选择题</span>
          <span class="question-count"><b id="currentNo">01</b> / 100</span>
        </div>
        <div class="score-pill"><span id="correctCount">0</span> 答对</div>
      </div>
      <div class="progress-track" aria-label="答题进度"><div id="progressBar"></div></div>

      <article class="question-card" id="questionCard">
        <div class="question-number" aria-hidden="true" id="bigNo">01</div>
        <h1 id="questionText"></h1>
        <div class="options" id="options" role="radiogroup" aria-label="请选择答案"></div>

        <div class="feedback" id="feedback" hidden>
          <div class="feedback-title">
            <span class="feedback-icon" id="feedbackIcon"></span>
            <div><strong id="feedbackHeading"></strong><small id="answerLine"></small></div>
          </div>
          <section class="analysis-module">
            <span class="module-kicker">第二模块 · 原题解析</span>
            <p id="analysisText"></p>
          </section>
          <section class="glossary-module" aria-labelledby="glossaryTitle">
            <div class="glossary-head">
              <div><span class="module-kicker">第三模块 · 专业名词白话讲堂</span><h2 id="glossaryTitle">把术语翻译成人话</h2></div>
              <span class="beginner-badge">新手友好</span>
            </div>
            <div class="glossary-cards" id="glossaryCards"></div>
          </section>
        </div>
      </article>

      <div class="quiz-actions">
        <button class="secondary-button" id="prevBtn" type="button">← 上一题</button>
        <button class="primary-button" id="submitBtn" type="button" disabled>确认答案</button>
        <button class="primary-button" id="nextBtn" type="button" hidden>下一题 →</button>
      </div>
    </section>

    <aside class="answer-sheet" id="answerSheet" aria-label="答题卡">
      <div class="sheet-head">
        <div><span class="eyebrow">学习轨迹</span><h2>答题卡</h2></div>
        <button class="icon-button mobile-only" id="closeSheetBtn" type="button" aria-label="关闭答题卡">×</button>
      </div>
      <div class="stats">
        <div><b id="answeredStat">0</b><span>已答</span></div>
        <div><b id="rightStat">0</b><span>正确</span></div>
        <div><b id="wrongStat">0</b><span>错题</span></div>
      </div>
      <div class="legend"><span><i class="dot current"></i>当前</span><span><i class="dot right"></i>正确</span><span><i class="dot wrong"></i>错误</span></div>
      <nav class="question-grid" id="questionGrid" aria-label="题目列表"></nav>
      <p class="sheet-note">进度会自动保存在当前浏览器中</p>
    </aside>
  </main>

  <div class="overlay" id="overlay" hidden></div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="data.js"></script>
  <script src="glossary.js?v=2"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
